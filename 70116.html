<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>1A2B 猜數字</title>
<style>
  body { font-family: Arial; text-align: center; }
  input, button { font-size: 18px; margin: 5px; }
</style>
</head>
<body>

<h1>🎮 1A2B 猜數字</h1>

<input id="guess" maxlength="4" placeholder="輸入4位數字">
<button onclick="check()">猜！</button>
<button onclick="restart()">重新開始</button>

<p id="result"></p>
<ul id="history"></ul>

<script>
let answer = generate();
let count = 0;

// 產生不重複4位數
function generate() {
  let nums = [];
  while (nums.length < 4) {
    let n = Math.floor(Math.random() * 10);
    if (!nums.includes(n)) nums.push(n);
  }
  return nums.join("");
}

// 檢查答案
function check() {
  let guess = document.getElementById("guess").value;
  if (guess.length != 4) return alert("請輸入4位數");

  let A = 0, B = 0;

  for (let i = 0; i < 4; i++) {
    if (guess[i] === answer[i]) A++;
    else if (answer.includes(guess[i])) B++;
  }

  count++;

  let li = document.createElement("li");
  li.textContent = `第${count}次：${guess} ➜ ${A}A${B}B`;
  document.getElementById("history").appendChild(li);

  if (A === 4) {
    document.getElementById("result").innerHTML =
      `🎉 恭喜答對！共猜 ${count} 次`;
  }
}

// 重開
function restart() {
  answer = generate();
  count = 0;
  document.getElementById("history").innerHTML = "";
  document.getElementById("result").innerHTML = "";
}
</script>

</body>
</html>
