<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>☁️ 大耳狗 1A2B</title>

<style>
body {
  font-family: "Arial";
  text-align: center;
  background: linear-gradient(to bottom, #dff6ff, #ffffff);
  color: #6bb7e8;
}

h1 {
  font-size: 42px;
  margin-top: 20px;
}

.container {
  background: white;
  width: 320px;
  margin: auto;
  padding: 20px;
  border-radius: 25px;
  box-shadow: 0 10px 20px rgba(150,200,255,0.3);
}

input {
  font-size: 20px;
  padding: 8px;
  border-radius: 15px;
  border: 2px solid #cceeff;
  width: 150px;
  text-align: center;
}

button {
  font-size: 18px;
  padding: 8px 15px;
  border-radius: 20px;
  border: none;
  background: #aee1f9;
  color: #fff;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #7ec8f5;
  transform: scale(1.05);
}

ul {
  text-align: left;
  padding-left: 20px;
}

.cinna {
  width: 140px;
  margin: 10px;
}

.bubble {
  background: #f0fbff;
  border-radius: 15px;
  padding: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>☁️ Cinnamoroll 1A2B 🐶</h1>

<img class="cinna" src="https://upload.wikimedia.org/wikipedia/en/3/3a/Cinnamoroll.png">

<div class="container">

<div class="bubble">💭 猜猜看大耳狗藏的數字吧～</div>

<input id="guess" maxlength="4" placeholder="輸入4位數"><br><br>

<button onclick="check()">🐾 猜一下</button>
<button onclick="restart()">🔄 重來</button>

<p id="result"></p>
<ul id="history"></ul>

</div>

<script>
let answer = generate();
let count = 0;

// 產生不重複數字
function generate() {
  let nums = [];
  while (nums.length < 4) {
    let n = Math.floor(Math.random() * 10);
    if (!nums.includes(n)) nums.push(n);
  }
  return nums.join("");
}

// 檢查答案
function check() {
  let guess = document.getElementById("guess").value;

  if (guess.length != 4) {
    alert("要輸入4位數字喔！");
    return;
  }

  let A = 0, B = 0;

  for (let i = 0; i < 4; i++) {
    if (guess[i] === answer[i]) A++;
    else if (answer.includes(guess[i])) B++;
  }

  count++;

  let li = document.createElement("li");
  li.textContent = `🐾 第${count}次：${guess} ➜ ${A}A${B}B`;
  document.getElementById("history").appendChild(li);

  if (A === 4) {
    document.getElementById("result").innerHTML =
      `🎉 Cinnamoroll：太厲害了！你只用了 ${count} 次就成功了！`;
  }
}

// 重來
function restart() {
  answer = generate();
  count = 0;
  document.getElementById("history").innerHTML = "";
  document.getElementById("result").innerHTML = "";
}
</script>

</body>
</html>
